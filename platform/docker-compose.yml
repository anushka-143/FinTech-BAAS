version: "3.9"

services:
  # ─── PostgreSQL 17 ───
  postgres:
    image: pgvector/pgvector:pg17
    container_name: fintech-postgres
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech_secret
      POSTGRES_DB: fintech_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d fintech_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis 8 ───
  redis:
    image: redis:8-alpine
    container_name: fintech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redpanda (Kafka-compatible) ───
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: fintech-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --smp 1
      - --memory 512M
      - --mode dev-container
    ports:
      - "19092:19092"
      - "18081:8081"   # schema registry
      - "18082:8082"   # admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # ─── Temporal Dev Server ───
  temporal:
    image: temporalio/auto-setup:latest
    container_name: fintech-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=fintech
      - POSTGRES_PWD=fintech_secret
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: fintech-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  # ─── MinIO (S3-compatible object store) ───
  minio:
    image: minio/minio:latest
    container_name: fintech-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  minio_data:
